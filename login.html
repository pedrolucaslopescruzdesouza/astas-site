<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAS | Acesso Administrativo</title>
    
    <!-- ÍCONE DA ABA DO NAVEGADOR (FAVICON) -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(circle at 50% 30%, rgba(31, 111, 120, 0.25) 0%, var(--bg-main) 70%);">

    <div class="container" style="max-width: 420px; width: 90%;">
        <div style="background-color: var(--bg-secondary); padding: 2.5rem; border-radius: 12px; border: 1px solid rgba(159, 178, 195, 0.15); box-shadow: var(--shadow); text-align: center;">
            
            <!-- LOGO -->
            <a href="index.html" style="display: inline-block; margin-bottom: 1.5rem;">
                <img src="logo.png" alt="Logo ASTAS" style="max-height: 45px;">
            </a>
            
            <h1 style="font-size: 1.5rem; color: var(--text-light); margin-bottom: 0.5rem;">Painel de Gestão</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Digites suas credenciais para gerenciar o portfólio.</p>

            <!-- FORMULÁRIO DE LOGIN -->
            <form id="login-form" style="display: flex; flex-direction: column; gap: 1.2rem; text-align: left;">
                <div>
                    <label style="display: block; color: var(--text-light); font-size: 0.85rem; margin-bottom: 5px; font-weight: 600;">E-MAIL ADMINISTRATIVO</label>
                    <input type="email" id="email" required placeholder="admin@astas.com.br" style="width: 100%; padding: 0.85rem 1rem; border-radius: 8px; border: 1px solid rgba(159, 178, 195, 0.2); background-color: var(--bg-main); color: var(--text-light); outline: none;">
                </div>

                <div>
                    <label style="display: block; color: var(--text-light); font-size: 0.85rem; margin-bottom: 5px; font-weight: 600;">SENHA</label>
                    <input type="password" id="password" required placeholder="••••••••" style="width: 100%; padding: 0.85rem 1rem; border-radius: 8px; border: 1px solid rgba(159, 178, 195, 0.2); background-color: var(--bg-main); color: var(--text-light); outline: none;">
                </div>

                <!-- MENSAGEM DE ERRO (Invisível por padrão) -->
                <div id="login-error" style="display: none; color: #ff6b6b; font-size: 0.85rem; background: rgba(255, 107, 107, 0.1); padding: 10px; border-radius: 6px; border: 1px solid rgba(255, 107, 107, 0.3); text-align: center;"></div>

                <button type="submit" id="btn-login" class="btn-primary" style="width: 100%; margin-top: 0.5rem; font-size: 1rem;">
                    Entrar no Sistema
                </button>
            </form>

            <div style="margin-top: 1.5rem; font-size: 0.85rem;">
                <a href="portfolio.html" style="color: var(--text-muted); text-decoration: none;">← Voltar para o Portfólio</a>
            </div>

        </div>
    </div>

    <!-- IMPORTAÇÕES SUPABASE E SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="auth.js"></script>
</body>
</html>
